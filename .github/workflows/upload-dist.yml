jobs:
  upload-dist:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v6.0.2'
      - name: 'Rename binary for release'
        run: 'cp dist/index.js vacuum-mail-app'
      - name: 'Upload vacuum-mail-app to draft release'
        uses: 'softprops/action-gh-release@v3.0.0'
        with:
          draft: true
          files: 'vacuum-mail-app'
name: 'Upload dist'
'on':
  push:
    tags:
      - 'v*'
permissions:
  contents: 'write'
